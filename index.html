<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="บัญชีเงิน">
<title>บัญชีรายรับรายจ่าย</title>
<style>
:root{--bg:#0a0f1e;--surface:#111827;--surface2:#1a2235;--border:#1f2d45;--text:#e8edf5;--text2:#8899b0;--text3:#4d6278;--accent:#3b82f6;--green:#10b981;--red:#f43f5e;--amber:#f59e0b;--purple:#8b5cf6}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Sarabun','Noto Sans Thai',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
input,select,textarea,button{font-family:inherit}
.header{background:var(--surface);padding:52px 16px 14px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.header-row{display:flex;justify-content:space-between;align-items:center}
.header-title{font-size:20px;font-weight:800;color:var(--text)}
.header-sub{font-size:12px;color:var(--text3);margin-top:2px}
.month-sel{background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:6px 10px;font-size:13px}
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0 24px;z-index:100}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:4px 6px}
.nav-icon{font-size:20px}
.nav-label{font-size:10px;color:var(--text3);font-weight:500}
.nav-label.on{color:var(--accent);font-weight:700}
.content{padding:14px 14px 100px}
.card{background:var(--surface);border-radius:16px;padding:14px;margin-bottom:12px;border:1px solid var(--border)}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.stat{background:var(--bg);border-radius:10px;padding:10px 6px;text-align:center}
.stat-lbl{font-size:11px;color:var(--text3);margin-bottom:4px}
.stat-val{font-size:13px;font-weight:800}
.acc-card{background:var(--surface);border-radius:16px;padding:14px;margin-bottom:10px;border:1px solid var(--border);position:relative;overflow:hidden}
.acc-bar{position:absolute;top:0;left:0;width:4px;height:100%;border-radius:4px 0 0 4px}
.acc-inner{padding-left:10px}
.acc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.acc-name{font-size:16px;font-weight:700}
.acc-bal{font-size:18px;font-weight:800}
.tx{display:flex;align-items:center;background:var(--surface);border-radius:12px;padding:12px;margin-bottom:8px;gap:10px;border:1px solid var(--border)}
.tx-ico{font-size:20px;flex-shrink:0}
.tx-info{flex:1;min-width:0}
.tx-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-sub{font-size:12px;color:var(--text3);margin-top:2px}
.tx-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.tx-tag{background:var(--surface2);border-radius:10px;padding:2px 7px;font-size:11px;color:var(--accent)}
.tx-right{text-align:right;flex-shrink:0}
.tx-amount{font-size:15px;font-weight:800}
.tx-del{font-size:11px;color:var(--text3);cursor:pointer;margin-top:3px;display:block}
.label{font-size:13px;color:var(--text2);margin:12px 0 6px;font-weight:600}
input[type=text],input[type=number],input[type=date],input[type=month],select,textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:10px 12px;font-size:15px;outline:none;-webkit-appearance:none;appearance:none}
input:focus,select:focus{border-color:var(--accent)}
.toggle{display:flex;background:var(--bg);border-radius:12px;padding:4px;margin-bottom:14px;gap:4px}
.toggle-btn{flex:1;padding:9px;border-radius:9px;border:none;cursor:pointer;font-weight:700;font-size:14px;background:transparent;color:var(--text3)}
.t-inc{background:var(--green)!important;color:#fff!important}
.t-exp{background:var(--red)!important;color:#fff!important}
.btn{width:100%;border:none;border-radius:12px;padding:14px;color:#fff;cursor:pointer;font-weight:800;font-size:16px;margin-top:10px}
.btn-blue{background:var(--accent)}
.btn-green{background:var(--green)}
.btn-red{background:var(--red)}
.btn-purple{background:var(--purple)}
.btn-outline{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.tags-wrap{display:flex;flex-wrap:wrap;gap:6px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:8px;min-height:44px;cursor:text}
.tag-chip{background:var(--surface2);border-radius:20px;padding:4px 10px;font-size:13px;color:var(--accent);display:flex;align-items:center;gap:4px}
.tag-chip span{cursor:pointer;color:var(--red);font-weight:700}
.tags-input{border:none;background:transparent;color:var(--text);font-size:14px;outline:none;min-width:100px;flex:1;padding:2px 4px}
.progress{background:var(--bg);border-radius:10px;height:8px;overflow:hidden;margin-top:8px}
.progress-bar{height:100%;border-radius:10px;transition:width 0.5s ease}
.budget-card{background:var(--surface);border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid var(--border)}
.chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--border);cursor:pointer;font-size:13px;font-weight:600;background:var(--surface);color:var(--text3)}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#1e3a5f;color:#93c5fd;padding:10px 20px;border-radius:30px;font-size:14px;font-weight:700;z-index:999;box-shadow:0 4px 24px rgba(0,0,0,.5);display:none;border:1px solid #3b82f6;white-space:nowrap}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:flex-end}
.modal-bg.show{display:flex}
.modal{background:var(--surface);border-radius:24px 24px 0 0;padding:20px 16px 40px;width:100%;max-height:85vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:800;margin-bottom:16px}
.emoji-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-top:8px}
.emoji-btn{font-size:24px;background:var(--bg);border:2px solid transparent;border-radius:10px;padding:6px;cursor:pointer;text-align:center}
.emoji-btn.sel{border-color:var(--accent)}
.empty{text-align:center;color:var(--text3);padding:40px 0;font-size:15px}
.section-title{font-size:12px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin:16px 0 8px}
.del-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:2px 6px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:4px 0;font-weight:600;color:var(--text3);font-size:11px}
td{padding:8px 0;vertical-align:middle}
tr.sep td{border-top:1px solid var(--border)}
tr.total td{border-top:2px solid var(--border);font-weight:800}
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div>
      <div class="header-title">💰 บัญชีเงิน</div>
      <div class="header-sub" id="header-sub">ยินดีต้อนรับ</div>
    </div>
    <select class="month-sel" id="monthSel" onchange="onMonthChange()"><option value="all">ทั้งหมด</option></select>
  </div>
</div>

<div class="content" id="content"></div>

<div class="nav">
  <button class="nav-btn" onclick="go('dash')"><span class="nav-icon">📊</span><span class="nav-label" id="n-dash">หน้าหลัก</span></button>
  <button class="nav-btn" onclick="go('add')"><span class="nav-icon">➕</span><span class="nav-label" id="n-add">เพิ่ม</span></button>
  <button class="nav-btn" onclick="go('transfer')"><span class="nav-icon">🔄</span><span class="nav-label" id="n-transfer">โอน</span></button>
  <button class="nav-btn" onclick="go('monthly')"><span class="nav-icon">📅</span><span class="nav-label" id="n-monthly">รายเดือน</span></button>
  <button class="nav-btn" onclick="go('budget')"><span class="nav-icon">🎯</span><span class="nav-label" id="n-budget">งบ</span></button>
  <button class="nav-btn" onclick="go('settings')"><span class="nav-icon">⚙️</span><span class="nav-label" id="n-settings">ตั้งค่า</span></button>
</div>

<!-- Modal Account -->
<div class="modal-bg" id="modalAcc">
  <div class="modal">
    <div class="modal-title" id="modalAccTitle">เพิ่มบัญชี</div>
    <div class="label">ชื่อบัญชี</div>
    <input type="text" id="acc-name" placeholder="เช่น ส่วนตัว, ลูก, เก็บ...">
    <div class="label">ไอคอน</div>
    <div class="emoji-grid" id="emojiGrid"></div>
    <div class="label">สี</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px" id="colorGrid"></div>
    <button class="btn btn-blue" onclick="saveAccount()" style="margin-top:16px">บันทึก</button>
    <button class="btn btn-outline" onclick="closeModal('modalAcc')">ยกเลิก</button>
  </div>
</div>

<!-- Modal Budget -->
<div class="modal-bg" id="modalBudget">
  <div class="modal">
    <div class="modal-title">ตั้งงบประมาณ</div>
    <div class="label">บัญชี</div><select id="bud-acc"></select>
    <div class="label">หมวดหมู่รายจ่าย</div><select id="bud-cat"></select>
    <div class="label">งบประมาณ (บาท)</div><input type="number" id="bud-amount" placeholder="0">
    <div class="label">เดือน</div><input type="month" id="bud-month">
    <button class="btn btn-blue" onclick="saveBudget()" style="margin-top:16px">บันทึก</button>
    <button class="btn btn-outline" onclick="closeModal('modalBudget')">ยกเลิก</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== CONSTANTS =====
const EMOJIS=['👤','🧒','🏦','💼','🏠','🚗','✈️','🎓','💊','🛒','🎮','🍜','☕','🐶','🌱','💎','🎸','📚','🏋️','🎨'];
const COLORS=['#3b82f6','#10b981','#f59e0b','#f43f5e','#8b5cf6','#06b6d4','#ec4899','#14b8a6','#f97316','#6366f1'];
const MTH=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
const DEF_CATS={income:['เงินเดือน','โบนัส','ค่าจ้าง','ดอกเบี้ย','อื่นๆ'],expense:['อาหาร','เดินทาง','ช็อปปิ้ง','สุขภาพ','ที่อยู่อาศัย','บันเทิง','อื่นๆ']};
const DEF_ACCOUNTS=[{id:'acc1',name:'ส่วนตัว',icon:'👤',color:'#3b82f6'},{id:'acc2',name:'ลูก',icon:'🧒',color:'#f59e0b'},{id:'acc3',name:'เก็บ',icon:'🏦',color:'#10b981'}];

// ===== STATE =====
let S={
  accounts:JSON.parse(JSON.stringify(DEF_ACCOUNTS)),
  transactions:[],
  categories:JSON.parse(JSON.stringify(DEF_CATS)),
  budgets:[]
};
let view='dash',selMonth='all',filterAcc='all',filterTag='',formType='expense',newCatType='expense';
let formTags=[],editAccId=null,selEmoji=EMOJIS[0],selColor=COLORS[0],monthlyAccFilter='all';

// ===== UTILS =====
function curYM(){return new Date().toISOString().slice(0,7)}
function fmt(n){return Number(n||0).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmts(n){return Number(n||0).toLocaleString('th-TH',{minimumFractionDigits:0,maximumFractionDigits:0})}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function mLabel(ym){const[y,m]=ym.split('-');return MTH[parseInt(m)-1]+' '+(parseInt(y)+543)}

// ===== STORAGE =====
function save(){try{localStorage.setItem('moneyapp_v4',JSON.stringify(S))}catch(e){}}
function load(){try{const d=localStorage.getItem('moneyapp_v4');if(d)S=JSON.parse(d)}catch(e){}}

// ===== TOAST =====
let toastT;
function toast(msg){clearTimeout(toastT);const el=document.getElementById('toast');el.textContent=msg;el.style.display='block';toastT=setTimeout(()=>el.style.display='none',2200)}

// ===== MODAL =====
function openModal(id){document.getElementById(id).classList.add('show')}
function closeModal(id){document.getElementById(id).classList.remove('show')}

// ===== NAV =====
function go(v){
  view=v;filterAcc='all';filterTag='';
  ['dash','add','transfer','monthly','budget','settings'].forEach(x=>{
    const el=document.getElementById('n-'+x);
    if(el)el.classList.toggle('on',x===v);
  });
  render();
}

// ===== MONTH =====
function buildMonthSel(){
  const months=[...new Set(S.transactions.map(t=>t.date?t.date.slice(0,7):'').filter(Boolean))];
  const cur=curYM();
  if(!months.includes(cur))months.push(cur);
  months.sort().reverse();
  const sel=document.getElementById('monthSel');
  const prev=selMonth;
  sel.innerHTML='<option value="all">ทั้งหมด</option>'+months.map(m=>`<option value="${m}" ${m===prev?'selected':''}>${mLabel(m)}</option>`).join('');
}
function onMonthChange(){selMonth=document.getElementById('monthSel').value;render()}

// ===== BALANCES =====
function getBalances(){
  const b={};
  S.accounts.forEach(a=>{
    const inc=S.transactions.filter(t=>t.accId===a.id&&t.type==='income').reduce((s,t)=>s+t.amount,0);
    const exp=S.transactions.filter(t=>t.accId===a.id&&t.type==='expense').reduce((s,t)=>s+t.amount,0);
    const tin=S.transactions.filter(t=>t.type==='transfer'&&t.toAccId===a.id).reduce((s,t)=>s+t.amount,0);
    const tout=S.transactions.filter(t=>t.type==='transfer'&&t.accId===a.id).reduce((s,t)=>s+t.amount,0);
    b[a.id]=inc-exp+tin-tout;
  });
  return b;
}

function mSummary(accId,ym){
  const txs=S.transactions.filter(t=>!ym||ym==='all'||t.date.slice(0,7)===ym);
  return{
    inc:txs.filter(t=>t.accId===accId&&t.type==='income').reduce((s,t)=>s+t.amount,0),
    exp:txs.filter(t=>t.accId===accId&&t.type==='expense').reduce((s,t)=>s+t.amount,0)
  };
}

function getFiltered(){
  return S.transactions.filter(t=>{
    const mOk=selMonth==='all'||t.date.slice(0,7)===selMonth;
    const aOk=filterAcc==='all'||t.accId===filterAcc||t.toAccId===filterAcc;
    const tagOk=!filterTag||(t.tags||[]).includes(filterTag);
    return mOk&&aOk&&tagOk;
  }).sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id));
}

function getAllTags(){
  const tags=new Set();
  S.transactions.forEach(t=>(t.tags||[]).forEach(tag=>tags.add(tag)));
  return[...tags];
}

// ===== TX ROW HTML =====
function txHTML(t){
  const acc=S.accounts.find(a=>a.id===t.accId);
  const toAcc=t.toAccId?S.accounts.find(a=>a.id===t.toAccId):null;
  const[,m,d]=(t.date||'').split('-');
  const dateStr=d?`${parseInt(d)} ${MTH[parseInt(m)-1]}`:'';
  const color=t.type==='income'?'#10b981':t.type==='expense'?'#f43f5e':'#8b5cf6';
  const icon=t.type==='income'?'💚':t.type==='expense'?'❤️':'🔄';
  const title=t.type==='transfer'?`${acc?.name||''} → ${toAcc?.name||''}`:t.category;
  const prefix=t.type==='income'?'+':t.type==='expense'?'-':'';
  const tagsHTML=(t.tags||[]).length?`<div class="tx-tags">${t.tags.map(tag=>`<span class="tx-tag">#${tag}</span>`).join('')}</div>`:'';
  return`<div class="tx">
    <div class="tx-ico">${acc?.icon||icon}</div>
    <div class="tx-info">
      <div class="tx-title">${title||''}</div>
      <div class="tx-sub">${acc?.name||''} • ${dateStr}${t.note?' • '+t.note:''}</div>
      ${tagsHTML}
    </div>
    <div class="tx-right">
      <div class="tx-amount" style="color:${color}">${prefix}฿${fmts(t.amount)}</div>
      <span class="tx-del" onclick="delTx('${t.id}')">ลบ</span>
    </div>
  </div>`;
}

// ===== RENDER =====
function render(){
  buildMonthSel();
  const balances=getBalances();
  const totalBal=Object.values(balances).reduce((s,b)=>s+b,0);
  document.getElementById('header-sub').textContent=`ยอดรวมทุกบัญชี ฿${fmt(totalBal)}`;
  const c=document.getElementById('content');
  if(view==='dash')c.innerHTML=renderDash(balances);
  else if(view==='add')c.innerHTML=renderAdd();
  else if(view==='transfer')c.innerHTML=renderTransfer(balances);
  else if(view==='monthly')c.innerHTML=renderMonthly();
  else if(view==='budget')c.innerHTML=renderBudget();
  else if(view==='settings')c.innerHTML=renderSettings();
}

// ===== DASH =====
function renderDash(balances){
  const filtered=getFiltered();
  const totalInc=S.transactions.filter(t=>t.type==='income'&&(selMonth==='all'||t.date.slice(0,7)===selMonth)).reduce((s,t)=>s+t.amount,0);
  const totalExp=S.transactions.filter(t=>t.type==='expense'&&(selMonth==='all'||t.date.slice(0,7)===selMonth)).reduce((s,t)=>s+t.amount,0);
  const totalBal=Object.values(balances).reduce((s,b)=>s+b,0);
  const tags=getAllTags();
  let h=`<div class="card">
    <div class="card-title" style="font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:12px">ภาพรวมทั้งหมด</div>
    <div class="grid3">
      <div class="stat"><div class="stat-lbl">รวมรับ</div><div class="stat-val" style="color:#10b981">฿${fmt(totalInc)}</div></div>
      <div class="stat"><div class="stat-lbl">รวมจ่าย</div><div class="stat-val" style="color:#f43f5e">฿${fmt(totalExp)}</div></div>
      <div class="stat"><div class="stat-lbl">คงเหลือรวม</div><div class="stat-val" style="color:#3b82f6">฿${fmt(totalBal)}</div></div>
    </div>
  </div>`;
  S.accounts.forEach(a=>{
    const bal=balances[a.id]||0;
    const s=mSummary(a.id,selMonth);
    h+=`<div class="acc-card">
      <div class="acc-bar" style="background:${a.color}"></div>
      <div class="acc-inner">
        <div class="acc-top">
          <div class="acc-name">${a.icon} ${a.name}</div>
          <div class="acc-bal" style="color:${bal>=0?'#10b981':'#f43f5e'}">฿${fmt(bal)}</div>
        </div>
        <div class="grid3">
          <div class="stat"><div class="stat-lbl">รับ</div><div class="stat-val" style="color:#10b981">฿${fmt(s.inc)}</div></div>
          <div class="stat"><div class="stat-lbl">จ่าย</div><div class="stat-val" style="color:#f43f5e">฿${fmt(s.exp)}</div></div>
          <div class="stat"><div class="stat-lbl">สุทธิ</div><div class="stat-val" style="color:${s.inc-s.exp>=0?'#3b82f6':'#f43f5e'}">฿${fmt(s.inc-s.exp)}</div></div>
        </div>
      </div>
    </div>`;
  });
  if(tags.length){
    h+=`<div class="section-title">กรองตาม Hashtag</div><div class="chips">
      <button class="chip ${!filterTag?'on':''}" onclick="setTag('')">ทั้งหมด</button>
      ${tags.map(tag=>`<button class="chip ${filterTag===tag?'on':''}" onclick="setTag('${tag}')">#${tag}</button>`).join('')}
    </div>`;
  }
  h+=`<div class="chips">
    <button class="chip ${filterAcc==='all'?'on':''}" onclick="setFiltAcc('all')">ทุกบัญชี</button>
    ${S.accounts.map(a=>`<button class="chip ${filterAcc===a.id?'on':''}" onclick="setFiltAcc('${a.id}')">${a.icon} ${a.name}</button>`).join('')}
  </div>
  <div class="section-title">รายการ (${filtered.length})</div>`;
  if(!filtered.length)h+=`<div class="empty">ยังไม่มีรายการ</div>`;
  else filtered.forEach(t=>h+=txHTML(t));
  return h;
}

// ===== ADD =====
function renderAdd(){
  const cats=S.categories[formType]||[];
  return`<div class="card">
    <div style="font-size:17px;font-weight:800;margin-bottom:14px">เพิ่มรายการ</div>
    <div class="toggle">
      <button class="toggle-btn ${formType==='income'?'t-inc':''}" onclick="setFormType('income')">💚 รายรับ</button>
      <button class="toggle-btn ${formType==='expense'?'t-exp':''}" onclick="setFormType('expense')">❤️ รายจ่าย</button>
    </div>
    <div class="label">บัญชี</div>
    <select id="f-acc">${S.accounts.map(a=>`<option value="${a.id}">${a.icon} ${a.name}</option>`).join('')}</select>
    <div class="label">หมวดหมู่</div>
    <select id="f-cat"><option value="">-- เลือกหมวดหมู่ --</option>${cats.map(c=>`<option value="${c}">${c}</option>`).join('')}</select>
    <div class="label">จำนวนเงิน (บาท)</div>
    <input type="number" id="f-amt" placeholder="0.00" inputmode="decimal">
    <div class="label">วันที่</div>
    <input type="date" id="f-date" value="${new Date().toISOString().slice(0,10)}">
    <div class="label">Hashtag (พิมพ์แล้วกด Space หรือ Enter)</div>
    <div class="tags-wrap" id="tagsWrap" onclick="document.getElementById('tagInput').focus()">
      ${formTags.map(tag=>`<div class="tag-chip">#${tag}<span onclick="removeTag('${tag}')">×</span></div>`).join('')}
      <input class="tags-input" id="tagInput" placeholder="${formTags.length?'':'เช่น ญี่ปุ่น...'}" onkeydown="tagKey(event)">
    </div>
    <div class="label">หมายเหตุ (ไม่บังคับ)</div>
    <input type="text" id="f-note" placeholder="หมายเหตุ...">
    <button class="btn ${formType==='income'?'btn-green':'btn-red'}" onclick="addTx()">✓ บันทึก</button>
  </div>`;
}

// ===== MONTHLY =====
function renderMonthly(){
  const allMonths=[...new Set(S.transactions.map(t=>t.date?t.date.slice(0,7):'').filter(Boolean))].sort().reverse();
  if(!allMonths.length)return`<div class="empty">ยังไม่มีข้อมูล<br><br><small>เพิ่มรายการก่อนนะครับ</small></div>`;
  let h=`<div style="font-size:17px;font-weight:800;margin-bottom:14px">📅 สรุปรายเดือน</div>
  <div class="chips">
    <button class="chip ${monthlyAccFilter==='all'?'on':''}" onclick="setMonthlyAcc('all')">ทุกบัญชี</button>
    ${S.accounts.map(a=>`<button class="chip ${monthlyAccFilter===a.id?'on':''}" onclick="setMonthlyAcc('${a.id}')">${a.icon} ${a.name}</button>`).join('')}
  </div>`;

  if(monthlyAccFilter==='all'){
    allMonths.forEach(ym=>{
      const totalInc=S.transactions.filter(t=>t.type==='income'&&t.date.slice(0,7)===ym).reduce((s,t)=>s+t.amount,0);
      const totalExp=S.transactions.filter(t=>t.type==='expense'&&t.date.slice(0,7)===ym).reduce((s,t)=>s+t.amount,0);
      const rows=S.accounts.map(a=>{
        const inc=S.transactions.filter(t=>t.accId===a.id&&t.type==='income'&&t.date.slice(0,7)===ym).reduce((s,t)=>s+t.amount,0);
        const exp=S.transactions.filter(t=>t.accId===a.id&&t.type==='expense'&&t.date.slice(0,7)===ym).reduce((s,t)=>s+t.amount,0);
        if(inc===0&&exp===0)return'';
        const net=inc-exp;
        return`<tr class="sep"><td>${a.icon} ${a.name}</td><td style="text-align:right;color:#10b981">฿${fmts(inc)}</td><td style="text-align:right;color:#f43f5e">฿${fmts(exp)}</td><td style="text-align:right;color:${net>=0?'#3b82f6':'#f43f5e'};font-weight:700">฿${fmts(net)}</td></tr>`;
      }).join('');
      h+=`<div class="card" style="margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <div style="font-size:15px;font-weight:800">${mLabel(ym)}</div>
          <div style="font-size:13px;color:${totalInc-totalExp>=0?'#10b981':'#f43f5e'};font-weight:700">สุทธิ ฿${fmts(totalInc-totalExp)}</div>
        </div>
        <table>
          <thead><tr><th>บัญชี</th><th style="text-align:right;color:#10b981">รับ</th><th style="text-align:right;color:#f43f5e">จ่าย</th><th style="text-align:right;color:#3b82f6">สุทธิ</th></tr></thead>
          <tbody>
            ${rows}
            <tr class="total"><td>รวม</td><td style="text-align:right;color:#10b981">฿${fmts(totalInc)}</td><td style="text-align:right;color:#f43f5e">฿${fmts(totalExp)}</td><td style="text-align:right;color:${totalInc-totalExp>=0?'#3b82f6':'#f43f5e'}">฿${fmts(totalInc-totalExp)}</td></tr>
          </tbody>
        </table>
      </div>`;
    });
  } else {
    const acc=S.accounts.find(a=>a.id===monthlyAccFilter);
    let grandInc=0,grandExp=0;
    const rows=allMonths.map(ym=>{
      const inc=S.transactions.filter(t=>t.accId===monthlyAccFilter&&t.type==='income'&&t.date.slice(0,7)===ym).reduce((s,t)=>s+t.amount,0);
      const exp=S.transactions.filter(t=>t.accId===monthlyAccFilter&&t.type==='expense'&&t.date.slice(0,7)===ym).reduce((s,t)=>s+t.amount,0);
      grandInc+=inc;grandExp+=exp;
      const net=inc-exp;
      return`<tr class="sep"><td>${mLabel(ym)}</td><td style="text-align:right;color:#10b981">฿${fmts(inc)}</td><td style="text-align:right;color:#f43f5e">฿${fmts(exp)}</td><td style="text-align:right;color:${net>=0?'#3b82f6':'#f43f5e'};font-weight:700">฿${fmts(net)}</td></tr>`;
    }).join('');
    h+=`<div class="card">
      <div style="font-size:15px;font-weight:700;margin-bottom:12px">${acc?.icon} ${acc?.name}</div>
      <table>
        <thead><tr><th>เดือน</th><th style="text-align:right;color:#10b981">รับ</th><th style="text-align:right;color:#f43f5e">จ่าย</th><th style="text-align:right;color:#3b82f6">สุทธิ</th></tr></thead>
        <tbody>
          ${rows}
          <tr class="total"><td>รวมทั้งหมด</td><td style="text-align:right;color:#10b981">฿${fmts(grandInc)}</td><td style="text-align:right;color:#f43f5e">฿${fmts(grandExp)}</td><td style="text-align:right;color:${grandInc-grandExp>=0?'#3b82f6':'#f43f5e'}">฿${fmts(grandInc-grandExp)}</td></tr>
        </tbody>
      </table>
    </div>`;
  }
  return h;
}
function setMonthlyAcc(id){monthlyAccFilter=id;render()}

// ===== BUDGET =====
function renderBudget(){
  const ym=selMonth==='all'?curYM():selMonth;
  const budgets=S.budgets.filter(b=>b.month===ym);
  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <div style="font-size:17px;font-weight:800">🎯 งบประมาณ ${mLabel(ym)}</div>
    <button class="btn btn-blue" style="width:auto;padding:8px 14px;font-size:14px;margin:0" onclick="openBudgetModal()">+ เพิ่ม</button>
  </div>`;
  if(!budgets.length)h+=`<div class="empty">ยังไม่มีงบประมาณเดือนนี้<br><br><small>กด + เพิ่ม เพื่อตั้งงบ</small></div>`;
  else budgets.forEach(bud=>{
    const acc=S.accounts.find(a=>a.id===bud.accId);
    const spent=S.transactions.filter(t=>t.accId===bud.accId&&t.type==='expense'&&t.category===bud.category&&t.date.slice(0,7)===ym).reduce((s,t)=>s+t.amount,0);
    const pct=Math.min(100,bud.amount>0?spent/bud.amount*100:0);
    const over=spent>bud.amount;
    const barColor=over?'#f43f5e':pct>80?'#f59e0b':'#10b981';
    h+=`<div class="budget-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div>
          <div style="font-size:14px;font-weight:700">${acc?.icon||''} ${acc?.name||''} • ${bud.category}</div>
          <div style="font-size:13px;color:${over?'#f43f5e':'#8899b0'}">ใช้ ฿${fmts(spent)} / ฿${fmts(bud.amount)} ${over?'⚠️ เกินงบ':''}</div>
        </div>
        <button class="del-btn" onclick="delBudget('${bud.id}')">🗑️</button>
      </div>
      <div class="progress"><div class="progress-bar" style="width:${pct}%;background:${barColor}"></div></div>
      <div style="font-size:11px;color:${over?'#f43f5e':'#4d6278'};margin-top:4px;text-align:right">${pct.toFixed(0)}%</div>
    </div>`;
  });
  return h;
}

// ===== SETTINGS =====
function renderSettings(){
  let h=`<div style="font-size:17px;font-weight:800;margin-bottom:16px">⚙️ ตั้งค่า</div>
  <div class="section-title">บัญชี (${S.accounts.length}/5)</div>`;
  S.accounts.forEach(a=>{
    h+=`<div style="display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;gap:10px">
      <div style="font-size:24px">${a.icon}</div>
      <div style="flex:1;font-weight:700">${a.name}</div>
      <div style="width:16px;height:16px;border-radius:50%;background:${a.color};margin-right:4px"></div>
      <button class="del-btn" onclick="editAccount('${a.id}')">✏️</button>
      <button class="del-btn" onclick="delAccount('${a.id}')">🗑️</button>
    </div>`;
  });
  if(S.accounts.length<5)h+=`<button class="btn btn-outline" onclick="openAddAccount()">+ เพิ่มบัญชี</button>`;
  h+=`<div class="section-title" style="margin-top:20px">หมวดหมู่</div>
  <div class="toggle">
    <button class="toggle-btn ${newCatType==='income'?'t-inc':''}" onclick="setNewCatType('income')">💚 รายรับ</button>
    <button class="toggle-btn ${newCatType==='expense'?'t-exp':''}" onclick="setNewCatType('expense')">❤️ รายจ่าย</button>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:10px">
    <input type="text" id="new-cat" placeholder="ชื่อหมวดหมู่ใหม่..." style="flex:1">
    <button class="btn btn-blue" style="width:auto;padding:0 16px;margin:0" onclick="addCat()">+</button>
  </div>
  <div style="display:flex;flex-wrap:wrap;gap:6px">
    ${(S.categories[newCatType]||[]).map(c=>`<div style="background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:13px;display:flex;align-items:center;gap:6px">${c}<span style="color:#f43f5e;cursor:pointer;font-weight:700" onclick="delCat('${newCatType}','${c}')">×</span></div>`).join('')}
  </div>
  <div class="section-title" style="margin-top:20px">ข้อมูล</div>
  <button class="btn btn-outline" onclick="exportCSV()">📤 Export CSV</button>`;
  return h;
}

// ===== ACTIONS =====
function setFormType(t){formType=t;formTags=[];render()}
function setNewCatType(t){newCatType=t;render()}
function setFiltAcc(id){filterAcc=id;render()}
function setTag(tag){filterTag=tag;render()}

function tagKey(e){
  if(e.key===' '||e.key==='Enter'){
    e.preventDefault();
    const val=e.target.value.replace(/^#/,'').trim();
    if(val&&!formTags.includes(val)){formTags.push(val);render();setTimeout(()=>document.getElementById('tagInput')?.focus(),50)}
    else e.target.value='';
  }
}
function removeTag(tag){formTags=formTags.filter(t=>t!==tag);render()}

function addTx(){
  const accId=document.getElementById('f-acc')?.value;
  const category=document.getElementById('f-cat')?.value;
  const amount=parseFloat(document.getElementById('f-amt')?.value||0);
  const date=document.getElementById('f-date')?.value;
  const note=document.getElementById('f-note')?.value||'';
  const tagVal=(document.getElementById('tagInput')?.value||'').replace(/^#/,'').trim();
  if(tagVal&&!formTags.includes(tagVal))formTags.push(tagVal);
  if(!amount||amount<=0)return toast('กรุณากรอกจำนวนเงิน');
  if(!category)return toast('กรุณาเลือกหมวดหมู่');
  S.transactions.unshift({id:uid(),type:formType,accId,category,amount,date,note,tags:[...formTags]});
  formTags=[];save();toast('บันทึกสำเร็จ ✓');render();
}

function addTransfer(){
  const from=document.getElementById('t-from')?.value;
  const to=document.getElementById('t-to')?.value;
  const amount=parseFloat(document.getElementById('t-amt')?.value||0);
  const date=document.getElementById('t-date')?.value;
  const note=document.getElementById('t-note')?.value||'';
  if(from===to)return toast('บัญชีต้นทางและปลายทางต้องต่างกัน');
  if(!amount||amount<=0)return toast('กรุณากรอกจำนวนเงิน');
  S.transactions.unshift({id:uid(),type:'transfer',accId:from,toAccId:to,category:'โอน',amount,date,note,tags:[]});
  save();toast('โอนสำเร็จ ✓');render();
}

function delTx(id){
  if(!confirm('ลบรายการนี้?'))return;
  S.transactions=S.transactions.filter(t=>t.id!==id);
  save();toast('ลบแล้ว');render();
}

function addCat(){
  const val=document.getElementById('new-cat')?.value.trim();
  if(!val)return;
  if(!S.categories[newCatType].includes(val)){S.categories[newCatType].push(val);save();toast('เพิ่มหมวดหมู่แล้ว ✓');render()}
}
function delCat(type,name){S.categories[type]=S.categories[type].filter(c=>c!==name);save();render()}

// ===== ACCOUNTS =====
function openAddAccount(){
  editAccId=null;selEmoji=EMOJIS[0];selColor=COLORS[0];
  document.getElementById('modalAccTitle').textContent='เพิ่มบัญชี';
  document.getElementById('acc-name').value='';
  buildEmojiGrid();buildColorGrid();openModal('modalAcc');
}
function editAccount(id){
  const acc=S.accounts.find(a=>a.id===id);if(!acc)return;
  editAccId=id;selEmoji=acc.icon;selColor=acc.color;
  document.getElementById('modalAccTitle').textContent='แก้ไขบัญชี';
  document.getElementById('acc-name').value=acc.name;
  buildEmojiGrid();buildColorGrid();openModal('modalAcc');
}
function buildEmojiGrid(){document.getElementById('emojiGrid').innerHTML=EMOJIS.map(e=>`<button class="emoji-btn ${e===selEmoji?'sel':''}" onclick="pickEmoji('${e}')">${e}</button>`).join('')}
function buildColorGrid(){document.getElementById('colorGrid').innerHTML=COLORS.map(c=>`<div onclick="pickColor('${c}')" style="width:32px;height:32px;border-radius:50%;background:${c};cursor:pointer;border:3px solid ${c===selColor?'#fff':'transparent'}"></div>`).join('')}
function pickEmoji(e){selEmoji=e;buildEmojiGrid()}
function pickColor(c){selColor=c;buildColorGrid()}
function saveAccount(){
  const name=document.getElementById('acc-name')?.value.trim();
  if(!name)return toast('กรุณากรอกชื่อบัญชี');
  if(editAccId){const acc=S.accounts.find(a=>a.id===editAccId);if(acc){acc.name=name;acc.icon=selEmoji;acc.color=selColor}}
  else{if(S.accounts.length>=5)return toast('มีบัญชีครบ 5 แล้ว');S.accounts.push({id:uid(),name,icon:selEmoji,color:selColor})}
  save();closeModal('modalAcc');toast('บันทึกบัญชีแล้ว ✓');render();
}
function delAccount(id){
  if(S.transactions.some(t=>t.accId===id||t.toAccId===id))return toast('ไม่สามารถลบบัญชีที่มีรายการอยู่');
  if(S.accounts.length<=1)return toast('ต้องมีบัญชีอย่างน้อย 1 บัญชี');
  if(!confirm('ลบบัญชีนี้?'))return;
  S.accounts=S.accounts.filter(a=>a.id!==id);save();toast('ลบบัญชีแล้ว');render();
}

// ===== BUDGET =====
function openBudgetModal(){
  const ym=selMonth==='all'?curYM():selMonth;
  document.getElementById('bud-acc').innerHTML=S.accounts.map(a=>`<option value="${a.id}">${a.icon} ${a.name}</option>`).join('');
  document.getElementById('bud-cat').innerHTML=S.categories.expense.map(c=>`<option value="${c}">${c}</option>`).join('');
  document.getElementById('bud-amount').value='';
  document.getElementById('bud-month').value=ym;
  openModal('modalBudget');
}
function saveBudget(){
  const accId=document.getElementById('bud-acc')?.value;
  const category=document.getElementById('bud-cat')?.value;
  const amount=parseFloat(document.getElementById('bud-amount')?.value||0);
  const month=document.getElementById('bud-month')?.value;
  if(!amount||amount<=0)return toast('กรุณากรอกงบประมาณ');
  S.budgets=S.budgets.filter(b=>!(b.accId===accId&&b.category===category&&b.month===month));
  S.budgets.push({id:uid(),accId,category,amount,month});
  save();closeModal('modalBudget');toast('ตั้งงบประมาณแล้ว ✓');render();
}
function delBudget(id){S.budgets=S.budgets.filter(b=>b.id!==id);save();render()}

// ===== EXPORT =====
function exportCSV(){
  const rows=[['วันที่','ประเภท','บัญชี','หมวดหมู่','จำนวน','หมายเหตุ','Hashtag']];
  S.transactions.forEach(t=>{
    const acc=S.accounts.find(a=>a.id===t.accId);
    rows.push([t.date,t.type==='income'?'รายรับ':t.type==='expense'?'รายจ่าย':'โอน',acc?.name||'',t.category||'',t.amount,t.note||'',(t.tags||[]).map(g=>'#'+g).join(' ')]);
  });
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='รายรับรายจ่าย.csv';a.click();
  toast('Export แล้ว ✓');
}

load();
go('dash');
